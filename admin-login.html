<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Sankalp Coaching Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-login-body {
            background: linear-gradient(135deg, #0f172a 0%, #334155 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .admin-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 50px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 40px 60px -15px rgba(0, 0, 0, 0.6);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .admin-icon {
            font-size: 4rem;
            color: var(--secondary);
            margin-bottom: 20px;
        }
        .security-badge {
            background: #fee2e2;
            color: #ef4444;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="admin-login-body">
    <div class="admin-card">
        <img class="admin-photo" src="coaching_center_logo_1775973304457.png" alt="Teacher Profile Photo">
        <div class="security-badge">Authorized Personnel Only</div>
        <h2 style="margin-bottom: 10px;">Teacher Login</h2>
        <p style="color: var(--text-muted); margin-bottom: 30px;">Access your management dashboard</p>

        <form id="adminLoginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="adminEmail" placeholder="Enter Username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" id="adminPass" placeholder="••••••••" required>
                    <i class="fas fa-eye toggle-password" onclick="togglePasswordVisibility('adminPass', this)"></i>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="margin-top: 10px; padding: 15px;">
                <i class="fas fa-lock"></i> Secure Login
            </button>
            <button type="button" class="btn btn-outline auth-switch-btn" onclick="window.location.href='login.html'" style="margin-top: 12px; padding: 12px;">
                <i class="fas fa-graduation-cap"></i> Go to Student Login
            </button>
        </form>
    </div>

    <script type="module" src="script.js"></script>
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('adminEmail').value.trim();
            const pass = document.getElementById('adminPass').value.trim();

            const btn = e.target.querySelector('button');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';
            btn.disabled = true;

            const attempt = window.tryAdminLogin ? window.tryAdminLogin(username, pass) : null;
            if (attempt === true) {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('isAdmin', 'true');
                localStorage.setItem('userEmail', window.currentTeacherEmail || 'admin@ccc.com');
                window.location.href = 'admin.html';
                return;
            }

            setTimeout(() => {
                alert("Incorrect Username or Password!");
                btn.innerHTML = '<i class="fas fa-lock"></i> Secure Login';
                btn.disabled = false;
            }, 500);
        });
    </script>
</body>
</html>
