<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Champaran Coaching Center</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-body">
    <div class="login-card">
        <div class="login-header">
            <img src="coaching_center_logo_1775973304457.png" alt="CCC Logo">
            <h2>Student Login</h2>
            <p>Use your Email and Phone Number to sign in</p>
        </div>
        
        <div id="loginSection">
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Student Email</label>
                    <input type="email" id="email" placeholder="example@gmail.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password (Phone Number)</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Enter your 10-digit number" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePasswordVisibility('password', this)"></i>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary login-btn">
                    <i class="fas fa-sign-in-alt"></i> Login to Dashboard
                </button>
            </form>
            
            <div style="margin-top: 25px; font-size: 0.8rem; border-top: 1px solid #f1f5f9; padding-top: 15px; text-align: center;">
                Are you a teacher? <a href="admin-login.html" style="color: var(--secondary); font-weight: 600;">Teacher Portal</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
